<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="description" content="Tu asistente personal inteligente para productividad, finanzas, nutrición y más" />
    <meta name="author" content="Lovable" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JARVIS" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JARVIS" />
    <meta property="og:description" content="Tu asistente personal inteligente" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:title" content="JARVIS" />
    <meta name="twitter:description" content="Tu asistente personal inteligente" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- EARLY anti-SW guard: runs BEFORE any PWA script can register -->
    <script>
      (function(){
        var h=location.hostname;
        var isPreview=(h==='localhost'||h==='127.0.0.1'||h.includes('lovableproject.com')||h.startsWith('preview--')||h.startsWith('id-preview--'));
        if(!isPreview) return;
        window.__jarvis_is_preview=true;
        // Block any future SW registration
        if('serviceWorker' in navigator){
          try{
            var sw=navigator.serviceWorker;
            if(sw&&typeof sw.register==='function'){
              sw.register=function(){return Promise.resolve(undefined)};
            }
          }catch(e){}
          // Unregister existing SWs
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){r.unregister()});
          });
        }
        // Clear all caches
        if('caches' in window){
          caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k)})});
        }
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div
        id="__boot_fallback"
        style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#141b2d;color:#fff;font-family:sans-serif;gap:1rem"
      >
        <p id="__boot_status">Cargando JARVIS...</p>
        <button
          id="__boot_retry"
          style="display:none;padding:0.75rem 2rem;background:#3b82f6;color:#fff;border:none;border-radius:0.5rem;cursor:pointer;font-size:1rem"
          onclick="(async()=>{this.disabled=true;this.textContent='Limpiando...';try{const r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()))}catch(e){}try{const k=await caches.keys();await Promise.all(k.map(x=>caches.delete(x)))}catch(e){}const u=new URL(location.href);u.searchParams.set('_cb',Date.now());location.replace(u)})()"
        >
          Reintentar
        </button>
      </div>
    </div>

    <!-- Chunk error recovery -->
    <script>
      window.addEventListener("vite:preloadError", function(e) {
        e.preventDefault();
        if (!sessionStorage.getItem("__jarvis_chunk_reload")) {
          sessionStorage.setItem("__jarvis_chunk_reload", "1");
          location.reload();
        }
      });
      // Show retry button after 12s if still loading
      setTimeout(function() {
        var fb = document.getElementById("__boot_fallback");
        var btn = document.getElementById("__boot_retry");
        if (fb && fb.parentNode && btn) btn.style.display = "block";
      }, 12000);
    </script>

    <!-- Standard Vite entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
