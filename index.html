<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="x-build-ts" content="__BUILD_TS__" />
    <!-- Lima theme tokens (defensa anti-flash azul) -->
    <style>
      :root {
        --primary: 73 100% 50%;
        --primary-foreground: 222 47% 5%;
        --ring: 73 100% 50%;
        --sidebar-primary: 73 100% 50%;
        --background: 222 47% 5%;
        --foreground: 180 30% 96%;
      }
    </style>
    <script>
      window.__APP_BUILD_TS__ = "__BUILD_TS__";
      window.__JARVIS_ACTIVE_SHELL = "v11-lime";
      // Aggressive early shell guard. Runs before React. Detects:
      //   - new build (__BUILD_TS__ changed) on this client
      //   - missing v11-lime shell marker (means we boot from old snapshot)
      //   - active SW or non-empty cache storage in preview
      // Then clears SW/caches/jarvis-keys and reloads once with canonical
      // ?jarvis_shell=v11-lime&jarvis_cb=<ts>. Never touches auth tokens.
      (function(){
        try {
          var h = location.hostname;
          var isPreview = (h === 'localhost' || h === '127.0.0.1' || h.indexOf('lovableproject.com') !== -1 || h.indexOf('lovable.app') !== -1 || h.indexOf('preview--') === 0 || h.indexOf('id-preview--') === 0);
          if (!isPreview) return;
          var current = window.__APP_BUILD_TS__ || '';
          var SHELL = 'v11-lime';
          var KEY = '__jarvis_html_build_ts';
          var SHELL_KEY = '__jarvis_active_shell';
          var ATTEMPTS = '__jarvis_html_build_attempts';
          var TECH_KEYS = [KEY, SHELL_KEY, ATTEMPTS, '__jarvis_build_id', '__jarvis_reloaded', '__jarvis_preview_sw_reset_attempts', '__jarvis_preview_html_mismatch_attempts', '__jarvis_auto_retry', '__jarvis_chunk_reload', '__jarvis_boot_auto_retry'];

          var savedBuild = '';
          var savedShell = '';
          try { savedBuild = localStorage.getItem(KEY) || ''; } catch(_){}
          try { savedShell = localStorage.getItem(SHELL_KEY) || ''; } catch(_){}

          var buildChanged = !!(savedBuild && current && savedBuild !== current);
          var shellMissing = savedShell !== SHELL;

          // Already on a canonical shell URL? URL marker shows a previous reload
          // already happened in this tab — don't loop.
          var hasShellParam = false;
          try { hasShellParam = new URL(location.href).searchParams.get('jarvis_shell') === SHELL; } catch(_){}

          var attempts = 0;
          try { attempts = Number(sessionStorage.getItem(ATTEMPTS) || '0'); } catch(_){}

          var needReload = (buildChanged || shellMissing) && !hasShellParam && attempts < 2;

          if (needReload) {
            try { sessionStorage.setItem(ATTEMPTS, String(attempts + 1)); } catch(_){}
            try { localStorage.setItem(KEY, current); } catch(_){}
            try { localStorage.setItem(SHELL_KEY, SHELL); } catch(_){}
            try { console.warn('[jarvis] stale shell detected → cleaning + reloading', { savedBuild: savedBuild, current: current, savedShell: savedShell }); } catch(_){}

            var swP = Promise.resolve();
            try {
              if ('serviceWorker' in navigator) {
                swP = navigator.serviceWorker.getRegistrations().then(function(rs){
                  return Promise.all(rs.map(function(r){ try{ return r.unregister(); }catch(_){ return null; } }));
                }).catch(function(){});
              }
            } catch(_){}
            var cacheP = Promise.resolve();
            try {
              if ('caches' in window) {
                cacheP = caches.keys().then(function(ks){
                  return Promise.all(ks.map(function(k){ try{ return caches.delete(k); }catch(_){ return null; } }));
                }).catch(function(){});
              }
            } catch(_){}
            Promise.all([swP, cacheP]).then(function(){
              try {
                var u = new URL(location.href);
                u.searchParams.set('jarvis_shell', SHELL);
                u.searchParams.set('jarvis_cb', String(Date.now()));
                u.searchParams.delete('_cb');
                location.replace(u.toString());
              } catch(_){
                location.reload();
              }
            });
            return;
          }

          // Stable boot: persist markers, reset attempts.
          try { sessionStorage.removeItem(ATTEMPTS); } catch(_){}
          try { if (current) localStorage.setItem(KEY, current); } catch(_){}
          try { localStorage.setItem(SHELL_KEY, SHELL); } catch(_){}
          try { console.info('[jarvis] active shell', SHELL, '· build', current); } catch(_){}
        } catch(_){}
      })();
    </script>
    <title>JARVIS</title>
    <meta name="description" content="Tu asistente personal inteligente para productividad, finanzas, nutrición y más" />
    <meta name="author" content="Lovable" />

    <!-- EARLY anti-SW guard: runs BEFORE any PWA script can register -->
    <script>
      (function(){
        var h=location.hostname;
        var isPreview=(h==='localhost'||h==='127.0.0.1'||h.includes('lovableproject.com')||h.startsWith('preview--')||h.startsWith('id-preview--'));
        var isLovablePublished=(h.includes('lovable.app')&&!h.startsWith('preview--')&&!h.startsWith('id-preview--'));
        var shouldDisableSw=(isPreview||isLovablePublished);
        if(!shouldDisableSw) return;
        window.__jarvis_is_preview=isPreview;
        // Block any future SW registration
        if('serviceWorker' in navigator){
          try{
            var sw=navigator.serviceWorker;
            if(sw&&typeof sw.register==='function'){
              sw.register=function(){return Promise.resolve(undefined)};
            }
          }catch(e){}
          // Unregister existing SWs
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){r.unregister()});
          });
        }
        // Clear all caches
        if('caches' in window){
          caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k)})});
        }
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div
        id="__boot_fallback"
        style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#141b2d;color:#fff;font-family:sans-serif;gap:1rem"
      >
        <p id="__boot_status">Cargando JARVIS...</p>
        <button
          id="__boot_retry"
          style="display:none;padding:0.75rem 2rem;background:#BEFF00;color:#07090E;border:none;border-radius:0.5rem;cursor:pointer;font-size:1rem;font-weight:600"
          onclick="window.__jarvisBootRetry(this)"
        >
          Reintentar
        </button>
      </div>
    </div>

    <!-- Chunk error recovery -->
    <script>
      (function () {
        function buildCacheBustUrl() {
          var href = window.location.href;
          var hashIndex = href.indexOf("#");
          var hash = "";
          if (hashIndex >= 0) {
            hash = href.slice(hashIndex);
            href = href.slice(0, hashIndex);
          }

          var queryIndex = href.indexOf("?");
          var base = queryIndex >= 0 ? href.slice(0, queryIndex) : href;
          var query = queryIndex >= 0 ? href.slice(queryIndex + 1) : "";

          var params = query
            ? query.split("&").filter(Boolean).filter(function (p) { return p.indexOf("_cb=") !== 0; })
            : [];

          params.push("_cb=" + Date.now());
          return base + "?" + params.join("&") + hash;
        }

        async function clearSwAndCaches() {
          try {
            if ("serviceWorker" in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function (r) { return r.unregister(); }));
            }
          } catch (_) {}

          try {
            if ("caches" in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }
          } catch (_) {}
        }

        async function bootRetry(button) {
          var status = document.getElementById("__boot_status");
          if (status) status.textContent = "Recuperando aplicación...";
          if (button) {
            button.disabled = true;
            button.textContent = "Limpiando...";
          }

          await clearSwAndCaches();

          try {
            sessionStorage.removeItem("__jarvis_chunk_reload");
            sessionStorage.removeItem("__jarvis_auto_retry");
          } catch (_) {}

          window.location.replace(buildCacheBustUrl());
        }

        window.__jarvisBootRetry = bootRetry;

        window.addEventListener("vite:preloadError", function (e) {
          e.preventDefault();
          if (!sessionStorage.getItem("__jarvis_chunk_reload")) {
            sessionStorage.setItem("__jarvis_chunk_reload", "1");
            window.location.replace(buildCacheBustUrl());
          }
        });

        window.addEventListener("unhandledrejection", function (e) {
          var reason = e && e.reason ? (e.reason.message || e.reason) : "";
          var msg = String(reason || "").toLowerCase();

          // Catch stale dynamic imports (cached index.html pointing to old modules)
          if (msg.indexOf("failed to fetch dynamically imported module") !== -1) {
            e.preventDefault();
            if (!sessionStorage.getItem("__jarvis_chunk_reload")) {
              sessionStorage.setItem("__jarvis_chunk_reload", "1");
              window.location.replace(buildCacheBustUrl());
              return;
            }
          }

          if (msg.indexOf("url is not a constructor") !== -1) {
            var status = document.getElementById("__boot_status");
            var btn = document.getElementById("__boot_retry");
            if (status) status.textContent = "Error de arranque detectado. Pulsa Reintentar.";
            if (btn) btn.style.display = "block";
          }
        });

        // Show retry button after 12s if still loading and try one automatic recovery
        setTimeout(function () {
          var fb = document.getElementById("__boot_fallback");
          var btn = document.getElementById("__boot_retry");
          if (!(fb && fb.parentNode)) return;

          if (btn) btn.style.display = "block";

          var alreadyRetried = false;
          try {
            alreadyRetried = sessionStorage.getItem("__jarvis_boot_auto_retry") === "1";
          } catch (_) {}

          if (!alreadyRetried) {
            try { sessionStorage.setItem("__jarvis_boot_auto_retry", "1"); } catch (_) {}
            bootRetry(btn);
          }
        }, 12000);
      })();
    </script>

    <!-- Standard Vite entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
